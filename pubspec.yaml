name: agri_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.1+3

environment:
  sdk: ^3.11.3

dependencies:
  firebase_core: ^4.5.0
  flutter:
    sdk: flutter
  flutter_map: ^8.2.2
  flutter_svg: ^2.0.17
  geolocator: ^13.0.4
  http: ^1.6.0
  image_picker: ^1.1.2
  latlong2: ^0.9.1
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_launcher_icons: ^0.14.2
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
