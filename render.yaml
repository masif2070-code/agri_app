services:
  - type: web
    name: agri-app-backend
    env: python
    plan: free
    rootDir: .
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: EE_PROJECT_ID
        sync: false
      - key: EE_SERVICE_ACCOUNT
        sync: false
      - key: EE_PRIVATE_KEY
        sync: false
